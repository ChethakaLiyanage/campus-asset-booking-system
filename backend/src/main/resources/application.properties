# =============================================================
#  Smart Campus Operations Hub - Application Configuration
#  IT3030 PAF 2026
# =============================================================

server.port=8080

# =============================================================
#  MongoDB Configuration
# =============================================================
spring.data.mongodb.uri=mongodb://localhost:27017/smart_campus_db
spring.data.mongodb.database=smart_campus_db

# =============================================================
#  JWT Configuration
# =============================================================
app.jwt.secret=your-256-bit-secret-key-replace-this-in-production-minimum-32-chars
app.jwt.expiration-ms=86400000

# =============================================================
#  OAuth2 - Google Sign-In
# =============================================================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# =============================================================
#  File Upload (for ticket attachments - max 3 images)
# =============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads/

# =============================================================
#  CORS
# =============================================================
app.cors.allowed-origins=http://localhost:5173

# =============================================================
#  Logging
# =============================================================
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=DEBUG
