name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ============================================================
  # Backend: Spring Boot Build & Test
  # ============================================================
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Tests
        run: mvn test -B
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/test_db
          APP_JWT_SECRET: test-secret-key-for-ci-at-least-32-chars-long
          APP_JWT_EXPIRATION_MS: 86400000

      - name: Package JAR (skip tests)
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-backend-jar
          path: backend/target/*.jar

  # ============================================================
  # Frontend: React Build
  # ============================================================
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_GOOGLE_CLIENT_ID: placeholder-client-id

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-frontend-dist
          path: frontend/dist/
